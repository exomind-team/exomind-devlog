<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExoMind 开发日报模板</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080d;--card:#0d1117;--card-hover:#161b22;--border:#21262d;
  --text:#e6edf3;--text-dim:#8b949e;--text-faint:#484f58;
  --accent:#58a6ff;--accent-glow:rgba(88,166,255,.15);
  --p0:#f85149;--p1:#d29922;--p2:#6e7681;
  --green:#2ea043;--green-dim:#238636;
  --purple:#8957e5;--orange:#d29922;
  --radius:10px;--radius-sm:6px;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;font-weight:300;
  line-height:1.6;min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(88,166,255,.06),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(137,87,229,.04),transparent);
}
a{color:var(--accent);text-decoration:none;transition:opacity .15s}
a:hover{opacity:.8}
code,.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* Header */
.header{text-align:center;padding:2.5rem 0 1.5rem;position:relative}
.header::after{content:'';display:block;width:80px;height:2px;margin:1rem auto 0;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:700;letter-spacing:.15em;color:var(--accent);text-shadow:0 0 30px rgba(88,166,255,.3)}
.header h1{font-size:2.2rem;font-weight:500;color:var(--text-dim);margin-top:.4rem;letter-spacing:.3em;text-transform:uppercase}
.header .meta{font-size:.85rem;color:var(--text-dim);margin-top:.5rem}
.header .meta .mono{color:var(--accent)}

/* Top Row */
.top-row{display:grid;grid-template-columns:1fr 2fr;gap:1rem;margin:1.5rem 0}
.weather-card{border-radius:var(--radius);padding:1.4rem;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.weather-card:hover{transform:scale(1.01)}
.weather-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.12),transparent 60%)}
.weather-emoji{font-size:2.5rem;position:relative}
.weather-label{font-size:1.3rem;font-weight:700;margin-top:.3rem;position:relative}
.weather-sub{font-size:.85rem;opacity:.85;margin-top:.3rem;position:relative}
.weather-details{max-height:0;overflow:hidden;transition:max-height .4s ease;position:relative}
.weather-details.open{max-height:500px}
.weather-details ul{list-style:none;margin-top:.8rem;font-size:.82rem;line-height:1.8}
.weather-details li::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:.5rem;vertical-align:middle}
.weather-details .up li::before{background:#2ea043}
.weather-details .down li::before{background:var(--p1)}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.metric-card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.metric-card .label{font-size:1.05rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em}
.metric-card .value{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;margin:.3rem 0;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.metric-card .delta{font-size:1.08rem;font-family:'JetBrains Mono',monospace;font-weight:700}
.metric-card .delta.up{color:var(--p1)}
.metric-card .delta.down{color:var(--green)}
.metric-card .delta.neutral{color:var(--text-faint)}
.metric-card .note{font-size:.75rem;color:var(--text-dim);margin-top:.2rem}
.metric-card .tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1c2128;border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .7rem;font-size:.82rem;white-space:nowrap;z-index:10;color:var(--text-dim)}
.metric-card:hover .tooltip{display:block}

/* Section Titles */
.section-title{font-size:.82rem;font-weight:700;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin:2rem 0 .8rem;display:flex;align-items:center;gap:.5rem}
.section-title::before{content:'';flex:0 0 3px;height:1rem;background:var(--accent);border-radius:2px}

/* Mainlines */
.mainline{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:.6rem;cursor:pointer;transition:border-color .2s}
.mainline:hover{border-color:var(--accent)}
.mainline-header{display:flex;align-items:center;justify-content:space-between}
.mainline-name{font-weight:500;font-size:.92rem}
.mainline-name .tag{display:inline-block;font-size:.75rem;padding:.1rem .4rem;border-radius:3px;margin-left:.5rem;vertical-align:middle;font-weight:700;letter-spacing:.05em}
.mainline-name .tag.new{background:rgba(46,160,67,.2);color:var(--green)}
.mainline-name .tag.stall{background:rgba(248,81,73,.15);color:var(--p0)}
.mainline-pct{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent)}
.mainline-bar{height:6px;background:var(--border);border-radius:3px;margin-top:.6rem;overflow:hidden}
.mainline-fill{height:100%;border-radius:3px;transition:width .8s ease;background:linear-gradient(90deg,var(--green-dim),var(--green))}
.mainline-fill.stall{background:linear-gradient(90deg,#6e4020,var(--p1))}
.mainline-subtasks{max-height:0;overflow:hidden;transition:max-height .35s ease}
.mainline-subtasks.open{max-height:600px}
.mainline-subtasks ul{list-style:none;margin-top:.7rem;font-size:.8rem;color:var(--text-dim)}
.mainline-subtasks li{padding:.25rem 0;display:flex;align-items:center;gap:.5rem}
.mainline-subtasks .done{color:var(--green)}
.mainline-subtasks .pending{color:var(--text-faint)}
.mainline-chevron{font-size:.8rem;color:var(--text-faint);transition:transform .2s}
.mainline-chevron.open{transform:rotate(90deg)}

/* Headlines */
.headline{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.3rem;margin-bottom:.6rem;border-left:3px solid var(--accent);transition:border-color .2s}
.headline-title{font-weight:700;font-size:1rem;margin-bottom:.3rem}
.headline-body{font-size:.82rem;color:var(--text-dim);line-height:1.7}
.gh-link{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent);border-bottom:1px dotted rgba(88,166,255,.3)}

/* Collapsibles */
.collapsible{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.6rem;overflow:hidden}
.collapsible-header{padding:.8rem 1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:500;font-size:.88rem;transition:background .15s}
.collapsible-header:hover{background:var(--card-hover)}
.collapsible-header .chevron{font-size:.8rem;color:var(--text-faint);transition:transform .2s}
.collapsible-header .chevron.open{transform:rotate(90deg)}
.collapsible-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.collapsible-body.open{max-height:2000px}
.collapsible-content{padding:0 1.2rem 1rem}

/* Scorecard */
.score-row{display:flex;align-items:center;gap:.7rem;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.82rem}
.score-row:last-child{border-bottom:none}
.score-badge{flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700}
.score-badge.pass{background:rgba(46,160,67,.15);color:var(--green)}
.score-badge.fail{background:rgba(248,81,73,.12);color:var(--p0)}
.score-badge.partial{background:rgba(210,153,34,.12);color:var(--p1)}
.score-text{flex:1;color:var(--text-dim)}
.score-note{font-size:.82rem;color:var(--text-faint)}

/* PR Table */
.pr-table{width:100%;border-collapse:collapse;font-size:.82rem}
.pr-table th{text-align:left;color:var(--text-faint);font-weight:500;font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;padding:.4rem 0;border-bottom:1px solid var(--border)}
.pr-table td{padding:.5rem 0;border-bottom:1px solid var(--border);color:var(--text-dim)}
.pr-table .num{font-family:'JetBrains Mono',monospace;color:var(--accent)}
.pr-status{display:inline-block;padding:.15rem .5rem;border-radius:3px;font-size:.78rem;font-weight:700}
.pr-status.locked{background:rgba(248,81,73,.12);color:var(--p0)}
.pr-status.review{background:rgba(88,166,255,.12);color:var(--accent)}
.pr-status.merged{background:rgba(46,160,67,.15);color:var(--green)}
.pr-status.docs{background:rgba(110,118,129,.15);color:var(--text-dim)}

/* Chart */
.chart-wrap{height:280px;position:relative}

/* Truth Table */
.truth-group-title{font-size:.85rem;color:var(--text-faint);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin:1rem 0 .5rem}
.truth-row{display:grid;grid-template-columns:60px 1fr 100px 100px;gap:.5rem;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.8rem}
.truth-row:last-child{border-bottom:none}
.truth-num{font-family:'JetBrains Mono',monospace}
.truth-badge{display:inline-block;padding:.1rem .45rem;border-radius:3px;font-size:.78rem;font-weight:700;text-align:center}
.truth-badge.open{background:rgba(248,81,73,.12);color:var(--p0)}
.truth-badge.closed{background:rgba(46,160,67,.15);color:var(--green)}
.truth-badge.fixed{background:rgba(46,160,67,.15);color:var(--green)}
.truth-badge.none{background:rgba(110,118,129,.12);color:var(--text-faint)}
.truth-badge.partial{background:rgba(210,153,34,.12);color:var(--p1)}
.truth-mismatch{background:rgba(210,153,34,.06);border-radius:var(--radius-sm)}

/* Actions */
.action-item{display:flex;align-items:flex-start;gap:.7rem;padding:.7rem 0;border-bottom:1px solid var(--border)}
.action-item:last-child{border-bottom:none}
.action-check{flex-shrink:0;width:20px;height:20px;margin-top:2px;cursor:pointer;accent-color:var(--accent)}
.action-text{font-size:.88rem}
.action-detail{font-size:.97rem;color:var(--text-dim);margin-top:.2rem}

/* Insight */
.insight{margin-top:2rem;padding:1.5rem;border-radius:var(--radius);background:linear-gradient(135deg,rgba(88,166,255,.04),rgba(137,87,229,.04));border:1px solid rgba(88,166,255,.1);position:relative}
.insight::before{content:'\2605';position:absolute;top:-.5rem;left:1.2rem;background:var(--bg);padding:0 .4rem;color:var(--accent);font-size:.9rem}
.insight p{font-size:.97rem;color:var(--text-dim);line-height:1.8;font-style:italic}
.insight .author{font-size:.82rem;color:var(--text-faint);margin-top:.5rem;text-align:right}

/* Footer */
.footer{text-align:center;padding:2rem 0 1rem;font-size:.78rem;color:var(--text-faint)}

/* Responsive */
@media(max-width:1199px){.top-row{grid-template-columns:1fr}.metrics-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:767px){html{font-size:14px}.top-row{grid-template-columns:1fr}.metrics-grid{grid-template-columns:repeat(2,1fr)}.truth-row{grid-template-columns:50px 1fr;gap:.3rem}.truth-row>:nth-child(3),.truth-row>:nth-child(4){grid-column:span 1}.logo{font-size:2rem}.header h1{font-size:1.4rem}.collapsible-body.open{max-height:3000px}}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:fadeUp .5s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
</style>
</head>

      { num: 761, title: '时间块追加任务误替换', gh: 'CLOSED', code: 'FIXED' },
      { num: 747, title: '目标页渲染稳定性', gh: 'CLOSED', code: 'FIXED' },

  // ── 战场清点 ──────────────────────────────────────────────────
  poolHealth: {

      { num: 789, title: 'session-runtime federation', priority: 'P1', staleDays: 1 },
      { num: 788, title: 'device metadata SQLite', priority: 'P1', staleDays: 2 },

  // ── 建议行动 (可勾选, localStorage 持久化) ────────────────────
  actions: [
    { text: '关闭 #777 #795', detail: 'PR #781 #798 已合并，对应 issue 应关闭' },

  // ── 底部洞察 ────────────────────────────────────────────────────
  insight: {

// ╔══════════════════════════════════════════════════════════════════╗
// ║  以下为渲染引擎 · 修改数据请改上方 REPORT，无需改动下方代码      ║
// ╚══════════════════════════════════════════════════════════════════╝

const GH_BASE = `https://github.com/${REPORT.meta.repo}/issues/`;
const GH_PR = `https://github.com/${REPORT.meta.repo}/pull/`;
const STORAGE_KEY = `exomind-actions-${REPORT.meta.date}`;

function ghLink(num) { return `<a class="gh-link" href="${GH_BASE}${num}">#${num}</a>`; }
function prLink(num) { return `<a class="gh-link" href="${GH_PR}${num}">#${num}</a>`; }

// Auto-linkify #xxx in plain text
function autoLink(text) {
  return text.replace(/#(\d+)/g, (_, n) => ghLink(n));
}

// Weather gradient map
const WEATHER_GRADIENTS = {
  sun:      'linear-gradient(135deg, #f0a500, #ff6b00)',
  cloudy:   'linear-gradient(135deg, #58a6ff, #8957e5)',
  overcast: 'linear-gradient(135deg, #6e7681, #484f58)',
  rain:     'linear-gradient(135deg, #6e40c9, #f85149)',
  storm:    'linear-gradient(135deg, #f85149, #da3633)',
};

const HEADLINE_COLORS = ['var(--green)', 'var(--accent)', 'var(--purple)', 'var(--orange)', 'var(--p0)', 'var(--text-dim)'];

function render() {
  const R = REPORT;
  const app = document.getElementById('app');
  document.title = `ExoMind ${R.meta.title} · ${R.meta.date}`;

  let html = '';

  // ── Header ──
  html += `<header class="header animate">
    <div class="logo">EXOMIND</div>
    <h1>${R.meta.title}</h1>
    <div class="meta">${R.meta.date} · 覆盖 ${R.meta.coverage} · 基线 <span class="mono">${R.meta.baseline}</span></div>
  </header>`;

  // ── Weather + Metrics ──
  const wGrad = WEATHER_GRADIENTS[R.weather.level] || WEATHER_GRADIENTS.cloudy;
  html += `<div class="top-row">
    <div class="weather-card animate d1" style="background:${wGrad}" onclick="toggleWeather()">
      <div class="weather-emoji">${R.weather.emoji}</div>
      <div class="weather-label">${R.weather.label}</div>
      <div class="weather-sub">点击查看详情 ▾</div>
      <div class="weather-details" id="weatherDetails">
        <div class="up"><ul>${R.weather.ups.map(t => `<li>${autoLink(t)}</li>`).join('')}</ul></div>
        <div class="down"><ul>${R.weather.downs.map(t => `<li>${autoLink(t)}</li>`).join('')}</ul></div>
      </div>
    </div>
    <div class="metrics-grid">
      ${R.metrics.map((m, i) => `<div class="metric-card animate d${i+2}">
        <div class="tooltip">${m.tooltip}</div>
        <div class="label">${m.label}</div>
        <div class="value">${m.value}</div>
        <div class="delta ${m.trend}">${m.delta}</div>
        <div class="note">${m.note}</div>
      </div>`).join('')}
    </div>
  </div>`;

  // ── Mainlines ──
  html += `<div class="section-title animate d3">主线追踪</div>`;
  R.mainlines.forEach((m, i) => {
    const tag = m.tag === 'new' ? '<span class="tag new">NEW</span>'
      : m.tag === 'stall' ? '<span class="tag stall">STALL</span>' : '';
    const subs = m.subtasks.map(s => {
      const icon = s.done ? '<span class="done">✓</span>' : '<span class="pending">○</span>';
      const link = s.issue ? ` ${ghLink(s.issue)}` : '';
      return `<li>${icon} ${s.text}${link}</li>`;
    }).join('');
    html += `<div class="mainline animate d${Math.min(i+2,6)}">
      <div class="mainline-header" onclick="toggleMainline(this)">
        <span class="mainline-name">${m.name} ${tag}</span>
        <span style="display:flex;align-items:center;gap:.6rem">
          <span class="mainline-pct">${m.pct}%</span>
          <span class="mainline-chevron">▶</span>
        </span>
      </div>
      <div class="mainline-bar"><div class="mainline-fill${m.stall?' stall':''}" style="width:${m.pct}%"></div></div>
      <div class="mainline-subtasks"><ul>${subs}</ul></div>
    </div>`;
  });

  // ── Headlines ──
  html += `<div class="section-title animate d4">头条</div>`;
  R.headlines.forEach((h, i) => {
    const color = h.color || HEADLINE_COLORS[i] || 'var(--accent)';
    html += `<div class="headline animate d${Math.min(i+4,6)}" style="border-left-color:${color}">
      <div class="headline-title">${h.emoji} ${h.title}</div>
      <div class="headline-body">${autoLink(h.body)}</div>
    </div>`;
  });

  // ── Scorecard (collapsible) ──
  html += renderCollapsible('📋 上期建议执行记分卡', '', 'd5', () => {
    return R.scorecard.map(s => {
      const icon = s.result === 'pass' ? '✓' : s.result === 'fail' ? '✗' : '△';
      return `<div class="score-row"><div class="score-badge ${s.result}">${icon}</div><div class="score-text">${autoLink(s.text)}<div class="score-note">${autoLink(s.note)}</div></div></div>`;
    }).join('');
  });

  // ── PR Board (collapsible) ──
  const prSummary = `· Open ${R.prs.open.length} · Merged ${R.prs.merged.length}`;
  html += renderCollapsible('🚦 PR 看板', prSummary, 'd5', () => {
    let t = '<table class="pr-table"><tr><th>#</th><th>标题</th><th>状态</th></tr>';
    R.prs.open.forEach(p => {
      const extra = p.extra ? ` ${p.extra}` : '';
      t += `<tr><td class="num"><a href="${GH_BASE}${p.num}">#${p.num}</a></td><td>${p.title}</td><td><span class="pr-status ${p.status}">${p.status}${extra}</span></td></tr>`;
    });
    t += '</table>';
    if (R.prs.merged.length) {
      t += '<div style="margin-top:.8rem;font-size:.85rem;color:var(--text-dim)">合并: ';
      t += R.prs.merged.map(p => `${prLink(p.num)} ${p.title} (${p.date})`).join(' · ');
      t += '</div>';
    }
    return t;
  });

  // ── Terrain (collapsible with chart) ──
  html += renderCollapsible('🏔️ Issue 地形图', '', 'd5', () => {
    return '<div class="chart-wrap"><canvas id="terrainChart"></canvas></div>';
  }, true);

  // ── Truth Table (collapsible) ──
  html += renderCollapsible('🔬 代码 vs GitHub 真相表', '', 'd6', () => {
    let t = '<div class="truth-row" style="font-size:.8rem;color:var(--text-faint);font-weight:700;border-bottom:1px solid var(--border)"><div></div><div>ISSUE</div><div>GITHUB</div><div>CODE</div></div>';
    if (R.truth.closed.length) t += renderTruthGroup('已关闭 · 代码验证通过', R.truth.closed);
    if (R.truth.stillOpen.length) t += renderTruthGroup('仍 OPEN · 代码已修复 ⚠️', R.truth.stillOpen);
    return t;
  });

  // ── Pool Health (Issue 时效清点) ──
  if (R.poolHealth) {
    const ph = R.poolHealth;
    // Build summary chips for collapsible header (like PR board)
    const phChips = [];
    if (ph.prIssueMismatch.length > 0) phChips.push(`<span style="color:var(--p1)">${ph.prIssueMismatch.length} 战果未清</span>`);
    if (ph.staleHighPriority.length > 0) phChips.push(`<span style="color:var(--p0)">${ph.staleHighPriority.length} 僵持</span>`);
    if (ph.noPriority.current > 0) phChips.push(`<span style="color:var(--p1)">${ph.noPriority.current} 未编入</span>`);
    else phChips.push(`<span style="color:var(--green)">全编入</span>`);
    if (ph.aging.pct > 0) phChips.push(`<span style="color:${ph.aging.pct > 40 ? 'var(--p0)' : ph.aging.pct > 25 ? 'var(--p1)' : 'var(--text-faint)'}">${ph.aging.pct}% 陈年</span>`);
    const phSummary = phChips.length ? ' · ' + phChips.join(' · ') : '';
    html += renderCollapsible('🕒 Issue 时效清点', phSummary, 'd6', () => {
      let c = '';
      // PR→Issue 断裂
      if (ph.prIssueMismatch.length > 0) {
        c += '<div style="margin-bottom:.8rem"><div style="font-size:.85rem;font-weight:700;color:var(--p1);margin-bottom:.3rem">🚩 战果未清</div>';
        ph.prIssueMismatch.forEach(m => {
          c += `<div style="font-size:.82rem;color:var(--text-dim);padding:.2rem 0">PR ${prLink(m.pr)} 已合并 → ${ghLink(m.issue)} 仍 OPEN</div>`;
        });
        c += '</div>';
      }
      // P0/P1 停滞
      if (ph.staleHighPriority.length > 0) {
        c += '<div style="margin-bottom:.8rem"><div style="font-size:.85rem;font-weight:700;color:var(--p0);margin-bottom:.3rem">⏳ 僵持线</div>';
        ph.staleHighPriority.forEach(s => {
          const barLen = Math.min(Math.round(s.staleDays / 2), 15);
          const bar = '█'.repeat(barLen) + '░'.repeat(Math.max(15 - barLen, 0));
          const cls = s.priority === 'P0' ? 'color:var(--p0)' : 'color:var(--p1)';
          c += `<div style="font-size:.82rem;color:var(--text-dim);padding:.2rem 0;font-family:'JetBrains Mono',monospace">${ghLink(s.num)} <span style="${cls}">${s.priority}</span> <span style="color:var(--text-faint)">${bar}</span> ${s.staleDays}d ${s.title}</div>`;
        });
        c += '</div>';
      }
      // 无优先级
      const npText = ph.noPriority.current === 0
        ? `<span style="color:var(--green)">全部编入 ✅</span>`
        : `<span style="color:var(--p1)">${ph.noPriority.current}</span>`;
      const npDelta = ph.noPriority.previous !== ph.noPriority.current
        ? ` <span style="color:var(--text-faint)">(上期 ${ph.noPriority.previous})</span>` : '';
      c += `<div style="font-size:.82rem;color:var(--text-dim);margin-top:.5rem">🏷 未编入 ${npText}${npDelta}</div>`;
      // 陈年阵地 — 总览 + 具体 issue 列表
      const agePct = ph.aging.pct;
      const ageColor = agePct > 40 ? 'var(--p0)' : agePct > 25 ? 'var(--p1)' : 'var(--text-dim)';
      c += `<div style="margin-top:.8rem"><div style="font-size:.85rem;font-weight:700;color:${ageColor};margin-bottom:.3rem">📦 陈年阵地 ${agePct}% &gt;30d (${ph.aging.oldCount}/${ph.aging.total})</div>`;
      if (ph.aging.samples && ph.aging.samples.length > 0) {
        ph.aging.samples.forEach(s => {
          const pColor = s.priority === 'P0' ? 'var(--p0)' : s.priority === 'P1' ? 'var(--p1)' : 'var(--text-faint)';
          c += `<div style="font-size:.82rem;color:var(--text-dim);padding:.15rem 0">${ghLink(s.num)} <span style="color:${pColor}">${s.priority}</span> <span style="color:var(--text-faint)">${s.ageDays}d</span> ${s.title}</div>`;
        });
      }
      c += '</div>';
      return c;
    });
  }

  // ── Actions ──
  html += `<div class="section-title animate d6">建议行动</div>`;
  const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  html += `<div id="actions" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem">`;
  R.actions.forEach((a, i) => {
    const checked = stored[i] ? 'checked' : '';
    html += `<div class="action-item">
      <input type="checkbox" class="action-check" ${checked} onchange="saveAction(${i}, this.checked)">
      <div><div class="action-text">${autoLink(a.text)}</div><div class="action-detail">${autoLink(a.detail)}</div></div>
    </div>`;
  });
  html += '</div>';

  // ── Insight ──
  html += `<div class="insight animate d6">
    <p>${autoLink(R.insight.text)}</p>
    <div class="author">— ${R.insight.author} · ${R.meta.date}</div>
  </div>`;

  // ── Footer ──
  const pub = R.publisher;
  const pubStr = pub ? `${pub.identity}·${pub.os} [${pub.model} ${pub.version}]` : 'ExoMind dev-daily agent';
  html += `<div class="footer">${pubStr}</div>`;

  app.innerHTML = html;
}

function renderCollapsible(title, subtitle, delay, contentFn, hasChart) {
  const sub = subtitle ? ` <span style="color:var(--text-faint);font-size:.75rem">${subtitle}</span>` : '';
  return `<div class="collapsible animate ${delay}">
    <div class="collapsible-header" onclick="toggleCollapsible(this${hasChart ? ',true' : ''})">
      <span>${title}${sub}</span><span class="chevron">▶</span>
    </div>
    <div class="collapsible-body"><div class="collapsible-content">${contentFn()}</div></div>
  </div>`;
}

function renderTruthGroup(title, items) {
  let h = `<div class="truth-group-title">${title}</div>`;
  items.forEach(t => {
    const cls = t.mismatch ? ' truth-mismatch' : '';
    h += `<div class="truth-row${cls}">
      <div class="truth-num"><a href="${GH_BASE}${t.num}">#${t.num}</a></div>
      <div style="color:var(--text-dim)">${t.title}</div>
      <div><span class="truth-badge ${t.gh.toLowerCase()}">${t.gh}</span></div>
      <div><span class="truth-badge ${t.code.toLowerCase()}">${t.code}</span></div>
    </div>`;
  });
  return h;
}

// ── Interactions ──
function toggleWeather() { document.getElementById('weatherDetails').classList.toggle('open'); }
function toggleMainline(header) {
  const card = header.closest('.mainline');
  card.querySelector('.mainline-subtasks').classList.toggle('open');
  card.querySelector('.mainline-chevron').classList.toggle('open');
}
let chartInstance = null;
function toggleCollapsible(header, hasChart) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
  if (hasChart && body.classList.contains('open')) setTimeout(renderChart, 50);
}
function saveAction(i, checked) {
  const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  s[i] = checked;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function renderChart() {
  const ctx = document.getElementById('terrainChart');
  if (!ctx) return;
  if (chartInstance) chartInstance.destroy();
  const d = REPORT.terrain;
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: d.labels,
      datasets: [{
        data: d.data,
        backgroundColor: d.labels.map(l => l === 'P0' ? 'rgba(248,81,73,.7)' : l === 'P1' ? 'rgba(210,153,34,.7)' : 'rgba(88,166,255,.4)'),
        borderColor: d.labels.map(l => l === 'P0' ? '#f85149' : l === 'P1' ? '#d29922' : '#58a6ff'),
        borderWidth: 1, borderRadius: 3,
      }],
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            afterLabel: (ctx) => {
              const label = ctx.label;
              const delta = d.deltas[d.labels.indexOf(label)];
              const hl = d.highlights[label];
              let r = delta ? `变化: ${delta}` : '';
              if (hl) r += (r ? '\n' : '') + hl;
              return r;
            }
          },
          backgroundColor: '#1c2128', borderColor: '#30363d', borderWidth: 1,
          titleColor: '#e6edf3', bodyColor: '#8b949e',
          titleFont: { family: 'JetBrains Mono' },
        },
      },
      scales: {
        x: { grid: { color: 'rgba(48,54,61,.5)' }, ticks: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 11 } } },
        y: { grid: { display: false }, ticks: { color: '#e6edf3', font: { family: 'Outfit', size: 12 } } },
      },
    },
  });
}

// Boot
render();
</script>
