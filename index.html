<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExoMind 开发日志</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080d;--card:#0d1117;--card-hover:#161b22;--border:#21262d;
  --text:#e6edf3;--text-dim:#8b949e;--text-faint:#484f58;
  --accent:#58a6ff;--accent-glow:rgba(88,166,255,.15);
  --p0:#f85149;--p1:#d29922;--green:#2ea043;
  --radius:10px;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;font-weight:300;
  line-height:1.6;min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(88,166,255,.06),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(137,87,229,.04),transparent);
}
a{color:var(--accent);text-decoration:none;transition:opacity .15s}
a:hover{opacity:.8}
.container{max-width:1200px;margin:0 auto;padding:2rem 1rem 3rem}

/* Header */
.header{text-align:center;padding:3rem 0 2rem;position:relative}
.header::after{content:'';display:block;width:80px;height:2px;margin:1.2rem auto 0;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:700;letter-spacing:.15em;color:var(--accent);text-shadow:0 0 30px rgba(88,166,255,.3)}
.header h1{font-size:1.6rem;font-weight:500;color:var(--text-dim);margin-top:.4rem;letter-spacing:.4em;text-transform:uppercase}
.header .meta{font-size:.85rem;color:var(--text-faint);margin-top:.5rem}

/* Two-column layout */
.columns{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem}
@media(max-width:900px){.columns{grid-template-columns:1fr}}

.column{min-width:0}

/* Section Title (collapsible) */
.section-header{
  font-size:.82rem;font-weight:700;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;
  margin:0 0 .8rem;display:flex;align-items:center;gap:.5rem;cursor:pointer;
  padding:.5rem 0;user-select:none;transition:color .15s;
}
.section-header:hover{color:var(--text)}
.section-header .bar{flex:0 0 3px;height:1rem;border-radius:2px}
.section-header .chevron{margin-left:auto;font-size:.7rem;color:var(--text-faint);transition:transform .2s}
.section-header .chevron.open{transform:rotate(90deg)}
.section-body{overflow:hidden;transition:max-height .4s ease}
.section-body.open{max-height:5000px}
.section-body.closed{max-height:0}

/* Report Cards */
.report-list{display:flex;flex-direction:column;gap:.7rem}
.report-card{
  display:block;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem 1.4rem;
  transition:border-color .2s,box-shadow .2s,transform .15s;
  cursor:pointer;
}
.report-card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow);transform:translateY(-1px)}
.report-card.latest{
  border-color:var(--accent);
  background:linear-gradient(135deg,rgba(88,166,255,.06),rgba(137,87,229,.04));
  box-shadow:0 0 24px var(--accent-glow);
  padding:1.4rem 1.6rem;
}
.report-card.latest .report-date{font-size:1.3rem}
.report-card.latest .report-title{font-size:.95rem;color:var(--text)}
.report-card.latest .report-metric .val{color:var(--text)}
.latest-badge{display:inline-block;font-size:.68rem;font-weight:700;padding:.1rem .5rem;border-radius:3px;background:rgba(88,166,255,.15);color:var(--accent);letter-spacing:.08em;margin-left:.6rem;vertical-align:middle}
.report-top{display:flex;align-items:center;justify-content:space-between;gap:1rem}
.report-date{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--accent)}
.report-weather{font-size:1.4rem}
.report-title{font-size:.85rem;color:var(--text-dim);margin-top:.3rem}
.report-metrics{display:flex;gap:1.2rem;margin-top:.6rem;flex-wrap:wrap}
.report-metric{font-size:.78rem;color:var(--text-faint)}
.report-metric .val{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text-dim);margin-right:.2rem}
.report-metric .delta{font-family:'JetBrains Mono',monospace;font-size:.72rem}
.report-metric .delta.up{color:var(--p1)}
.report-metric .delta.down{color:var(--green)}
.report-metric .delta.neutral{color:var(--text-faint)}

/* Empty State */
.empty{text-align:center;padding:3rem 0;color:var(--text-faint)}
.empty .icon{font-size:2.5rem;margin-bottom:.8rem}

/* Footer */
.footer{text-align:center;padding:2rem 0 1rem;font-size:.78rem;color:var(--text-faint)}
.footer a{color:var(--accent)}

/* Loading */
.loading{text-align:center;padding:3rem 0;color:var(--text-faint);font-size:.9rem}

/* Responsive */
@media(max-width:767px){html{font-size:14px}.logo{font-size:2rem}.header h1{font-size:1.2rem}.report-metrics{gap:.8rem}}

/* Animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:fadeUp .5s ease both}
</style>
</head>
<body>
<div class="container">
  <header class="header animate">
    <div class="logo">EXOMIND</div>
    <h1>开 发 归 档</h1>
    <div class="meta">公开归档 · 项目进展追踪 · 日报 / 航线</div>
  </header>

  <div class="columns">
    <!-- Left: 开发日报 -->
    <div class="column">
      <div class="section-header animate" onclick="toggleSection('reports-body', this)">
        <span class="bar" style="background:var(--accent)"></span>
        📋 开发日报
        <span class="chevron open">▶</span>
      </div>
      <div id="reports-body" class="section-body open">
        <div id="reports" class="loading">加载中...</div>
      </div>
    </div>

    <!-- Right: 开发航线 -->
    <div class="column">
      <div class="section-header animate" onclick="toggleSection('routes-body', this)">
        <span class="bar" style="background:#f0883e"></span>
        🗺️ 开发航线
        <span class="chevron open">▶</span>
      </div>
      <div id="routes-body" class="section-body open">
        <div id="routes" class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/exomind-team/exomind">ExoMind</a> · 由 dev-daily / dev-route Agent 生成
  </div>
</div>
<script>
// ── Toggle ──
function toggleSection(bodyId, header) {
  const body = document.getElementById(bodyId);
  const chevron = header.querySelector('.chevron');
  const isOpen = body.classList.contains('open');
  if (isOpen) {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => { body.classList.remove('open'); body.classList.add('closed'); body.style.maxHeight = '0'; });
    chevron.classList.remove('open');
  } else {
    body.classList.remove('closed'); body.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
    setTimeout(() => { body.style.maxHeight = ''; }, 400);
    chevron.classList.add('open');
  }
}

// ── Reports ──
const reportsContainer = document.getElementById('reports');

fetch('reports/manifest.json')
  .then(r => r.json())
  .then(data => {
    const reports = data.reports || [];
    if (!reports.length) {
      reportsContainer.innerHTML = '<div class="empty"><div class="icon">📭</div>暂无日报</div>';
      return;
    }
    reportsContainer.className = 'report-list';
    reportsContainer.innerHTML = reports.map((r, i) => {
      const isLatest = i === 0;
      const cls = isLatest ? 'report-card latest animate' : 'report-card animate';
      const badge = isLatest ? '<span class="latest-badge">LATEST</span>' : '';
      const metrics = (r.metrics || []).map(m =>
        `<span class="report-metric"><span class="val">${m.value}</span>${m.label}<span class="delta ${m.trend || ''}">${m.delta || ''}</span></span>`
      ).join('');
      return `<a class="${cls}" style="animation-delay:${i * 0.05}s" href="reports/${r.file}">
        <div class="report-top">
          <span class="report-date">${r.date}${badge}</span>
          <span class="report-weather" title="${r.weather?.label || ''}">${r.weather?.emoji || ''}</span>
        </div>
        <div class="report-title">${r.title || '开发日志'}</div>
        <div class="report-metrics">${metrics}</div>
      </a>`;
    }).join('');
  })
  .catch(() => {
    reportsContainer.innerHTML = '<div class="empty"><div class="icon">⚠️</div>加载失败</div>';
  });

// ── Routes ──
const routesContainer = document.getElementById('routes');

fetch('routes/manifest.json')
  .then(r => r.json())
  .then(data => {
    const routes = data.routes || [];
    if (!routes.length) {
      routesContainer.innerHTML = '<div class="empty"><div class="icon">🗺️</div>暂无航线</div>';
      return;
    }
    routesContainer.className = 'report-list';
    routesContainer.innerHTML = routes.map((r, i) => {
      const isLatest = i === 0;
      const cls = isLatest ? 'report-card latest animate' : 'report-card animate';
      const badge = isLatest ? '<span class="latest-badge">LATEST</span>' : '';
      const metrics = (r.metrics || []).map(m =>
        `<span class="report-metric"><span class="val">${m.value}</span>${m.label}</span>`
      ).join('');
      return `<a class="${cls}" style="animation-delay:${i * 0.05}s" href="routes/${r.file}">
        <div class="report-top">
          <span class="report-date">${r.date}${badge}</span>
          <span class="report-weather" title="${r.status?.label || ''}">${r.status?.emoji || ''}</span>
        </div>
        <div class="report-title">${r.title || '开发航线'}</div>
        <div class="report-metrics">${metrics}</div>
      </a>`;
    }).join('');
  })
  .catch(() => {
    routesContainer.innerHTML = '<div class="empty"><div class="icon">🗺️</div>暂无航线</div>';
  });
</script>
</body>
</html>
